<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PB Hero Bot - Control Login</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #060913;
            --panel-bg: rgba(13, 20, 38, 0.45);
            --border-color: rgba(255, 255, 255, 0.08);
            --primary-accent: #6366f1;
            --primary-gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            --error-color: #f43f5e;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --shadow-glow: 0 12px 40px 0 rgba(99, 102, 241, 0.25);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            transition: all 0.25s ease;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 10% 20%, rgba(99, 102, 241, 0.12) 0px, transparent 50%),
                radial-gradient(at 90% 80%, rgba(168, 85, 247, 0.12) 0px, transparent 50%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            overflow: hidden;
        }

        .login-card {
            background: var(--panel-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border-color);
            border-radius: 28px;
            width: 100%;
            max-width: 440px;
            padding: 44px 36px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            position: relative;
            z-index: 10;
            animation: cardEntry 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes cardEntry {
            from { opacity: 0; transform: translateY(40px) scale(0.96); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .logo-icon {
            width: 56px;
            height: 56px;
            background: var(--primary-gradient);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            margin: 0 auto 20px auto;
            box-shadow: var(--shadow-glow);
        }

        .header-title {
            text-align: center;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .header-desc {
            text-align: center;
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 36px;
            line-height: 1.5;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .form-group input {
            width: 100%;
            background: rgba(6, 9, 19, 0.55);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 14px 18px;
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            font-size: 14px;
            letter-spacing: 0.5px;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary-accent);
            box-shadow: 0 0 16px rgba(99, 102, 241, 0.2);
            background: rgba(6, 9, 19, 0.7);
        }

        .btn-login {
            font-family: 'Outfit', sans-serif;
            font-size: 14px;
            font-weight: 600;
            padding: 14px;
            width: 100%;
            border-radius: 14px;
            cursor: pointer;
            border: none;
            background: var(--primary-gradient);
            color: white;
            box-shadow: var(--shadow-glow);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 10px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 16px 48px 0 rgba(99, 102, 241, 0.4);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .btn-login:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* Error message styles */
        .error-message {
            background: rgba(244, 63, 94, 0.1);
            border: 1px solid var(--error-color);
            color: var(--text-main);
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 12px;
            margin-bottom: 24px;
            display: none;
            animation: shake 0.4s ease both;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-6px); }
            40%, 80% { transform: translateX(6px); }
        }

        footer {
            position: absolute;
            bottom: 20px;
            text-align: center;
            width: 100%;
            color: var(--text-muted);
            font-size: 11px;
            letter-spacing: 0.5px;
            z-index: 1;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo-icon">🔒</div>
        <h2 class="header-title">PB Hero Console</h2>
        <p class="header-desc">Enter authorization password to access active forwarding system dashboard</p>

        <div id="error-box" class="error-message"></div>

        <form id="login-form" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="password">Security Password</label>
                <div class="input-wrapper">
                    <input type="password" id="password" placeholder="••••••••••••" required autocomplete="current-password">
                </div>
            </div>
            <button id="btn-submit" type="submit" class="btn-login">Verify Password & Enter ➔</button>
        </form>
    </div>

    <footer>
        © 2026 PB Hero Bot Control Systems. Protected Session.
    </footer>

    <script>
        async function handleLogin(e) {
            e.preventDefault();
            const passwordInput = document.getElementById('password');
            const submitBtn = document.getElementById('btn-submit');
            const errorBox = document.getElementById('error-box');
            
            const password = passwordInput.value.trim();
            if (!password) return;

            // Update UI state
            submitBtn.disabled = true;
            submitBtn.innerText = "Authenticating Session...";
            errorBox.style.display = "none";

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ password: password })
                });

                const data = await response.json();
                if (response.ok) {
                    submitBtn.innerText = "Access Granted! Loading...";
                    // Redirect to dashboard
                    setTimeout(() => {
                        window.location.reload();
                    }, 500);
                } else {
                    submitBtn.disabled = false;
                    submitBtn.innerText = "Verify Password & Enter ➔";
                    errorBox.innerText = data.detail || "Authentication failed.";
                    errorBox.style.display = "block";
                    passwordInput.value = '';
                    passwordInput.focus();
                }
            } catch (err) {
                submitBtn.disabled = false;
                submitBtn.innerText = "Verify Password & Enter ➔";
                errorBox.innerText = "Network connection failed. Try again.";
                errorBox.style.display = "block";
            }
        }
    </script>
</body>
</html>
